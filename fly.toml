# fly.toml — Regional Flight Optimizer
app = "regional-flight-optimizer"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"

[[mounts]]
  source = "rfo_data"
  destination = "/app/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
